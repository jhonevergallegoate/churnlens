# =====================================================================
# Dependabot — actualizaciones automáticas de dependencias
# =====================================================================
version: 2

updates:
  # Python (pip) dependencies declared in pyproject.toml
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      production-deps:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-deps:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
