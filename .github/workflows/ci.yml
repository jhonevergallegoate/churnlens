name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type-check · Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          pip --version

      - name: Install package + dev extras
        run: pip install -e ".[dev,notebooks]"

      - name: Ruff (lint)
        run: ruff check src/churnlens tests scripts

      - name: Ruff (format check)
        run: ruff format --check src/churnlens tests scripts

      - name: Mypy (strict)
        run: mypy src/churnlens

      - name: Pytest with coverage
        run: pytest

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  smoke-test-pipeline:
    name: End-to-end smoke test (data acquisition)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run data acquisition end-to-end
        run: python scripts/data_acquisition/main.py --quiet

      - name: Verify expected outputs
        run: |
          test -f data/raw/telco_customer_churn.csv
          test -f data/raw/.checksums.json
          test -f data/interim/telco_customer_churn.parquet
          python -c "import pandas as pd; df = pd.read_parquet('data/interim/telco_customer_churn.parquet'); assert df.shape == (7043, 21), df.shape"
