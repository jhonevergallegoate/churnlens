name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type-check · Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          pip --version

      - name: Install package + dev extras
        run: pip install -e ".[dev,notebooks]"

      - name: Ruff (lint)
        run: ruff check src/churnlens tests scripts

      - name: Ruff (format check)
        run: ruff format --check src/churnlens tests scripts

      - name: Mypy (strict)
        run: mypy src/churnlens

      - name: Pytest with coverage
        run: pytest

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  smoke-test-pipeline:
    name: End-to-end smoke test (data acquisition)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run data acquisition end-to-end (Fase 1)
        run: python scripts/data_acquisition/main.py --quiet

      - name: Verify expected outputs (Fase 1)
        run: |
          test -f data/raw/telco_customer_churn.csv
          test -f data/raw/.checksums.json
          test -f data/interim/telco_customer_churn.parquet
          python -c "import pandas as pd; df = pd.read_parquet('data/interim/telco_customer_churn.parquet'); assert df.shape == (7043, 21), df.shape"

  smoke-test-phase2:
    name: End-to-end smoke test (preprocesamiento + EDA · Fase 2)
    runs-on: ubuntu-latest
    needs: smoke-test-pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Download dataset
        run: python scripts/data_acquisition/main.py --quiet

      - name: Run preprocessing pipeline (Fase 2)
        run: python scripts/preprocessing/main.py --quiet

      - name: Run EDA report (Fase 2)
        run: python scripts/eda/main.py --quiet

      - name: Verify expected outputs (Fase 2)
        run: |
          test -f data/processed/train.parquet
          test -f data/processed/val.parquet
          test -f data/processed/test.parquet
          test -f data/processed/preprocessor.joblib
          test -f data/processed/feature_names.json
          test -f data/processed/metadata.json
          python <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          train = pd.read_parquet("data/processed/train.parquet")
          val = pd.read_parquet("data/processed/val.parquet")
          test = pd.read_parquet("data/processed/test.parquet")
          assert train.shape == (4929, 36), train.shape
          assert val.shape == (1057, 36), val.shape
          assert test.shape == (1057, 36), test.shape

          meta = json.loads(Path("data/processed/metadata.json").read_text("utf-8"))
          assert meta["n_features_out"] == 35, meta["n_features_out"]
          assert 0.25 < meta["target_positive_rate_global"] < 0.28, meta

          for split_name in ("train", "val", "test"):
              rate = meta["splits"][split_name]["positive_rate"]
              assert 0.25 < rate < 0.28, (split_name, rate)

          figs = list(Path("reports/figures").glob("eda_*.png"))
          tabs = list(Path("reports/tables").glob("eda_*.csv"))
          assert len(figs) == 9, [p.name for p in figs]
          assert len(tabs) == 4, [p.name for p in tabs]
          print("smoke-test-phase2 OK")
          PY

      - name: Upload EDA artifacts
        uses: actions/upload-artifact@v7
        with:
          name: eda-artifacts
          path: |
            reports/figures/eda_*.png
            reports/tables/eda_*.csv
            data/processed/metadata.json
          if-no-files-found: error
          retention-days: 30

  smoke-test-phase3:
    name: End-to-end smoke test (modelado · Fase 3)
    runs-on: ubuntu-latest
    needs: smoke-test-phase2

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Download dataset
        run: python scripts/data_acquisition/main.py --quiet

      - name: Run preprocessing pipeline (Fase 2)
        run: python scripts/preprocessing/main.py --quiet

      - name: Train baselines + LightGBM (subset rápido)
        run: |
          python scripts/training/main.py --quiet --cv 3 \
            --models dummy_stratified dummy_prior logreg_balanced logreg_l1 lightgbm

      - name: Evaluate winning model
        run: python scripts/evaluation/main.py --quiet

      - name: Verify expected outputs (Fase 3)
        run: |
          test -f reports/tables/feature_selection_consensus.csv
          test -f reports/tables/feature_selection_scores.csv
          test -f reports/tables/feature_selection_ranks.csv
          test -f reports/tables/modeling_summary.csv
          test -f reports/tables/modeling_cv_scores.csv
          test -f reports/tables/modeling_best_summary.json
          test -f reports/figures/modeling_pr_curves_val.png
          test -f reports/figures/modeling_roc_curves_val.png
          test -f data/processed/feature_consensus.json
          test -f models/lightgbm.joblib
          test -f models/lightgbm.metadata.json
          python <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          summary = pd.read_csv("reports/tables/modeling_summary.csv")
          assert summary.shape[0] >= 4, summary.shape
          best = json.loads(Path("reports/tables/modeling_best_summary.json").read_text("utf-8"))
          assert best["val_pr_auc_best"] > 0.40, best  # PR-AUC ganador debe vencer base rate (~0.27)
          cv = pd.read_csv("reports/tables/modeling_cv_scores.csv")
          assert (cv["cv_pr_auc_mean"] > 0).all(), cv
          consensus = json.loads(Path("data/processed/feature_consensus.json").read_text("utf-8"))
          assert len(consensus["top_k_features"]) == consensus["k"]
          print("smoke-test-phase3 OK")
          PY

      - name: Upload modeling artifacts
        uses: actions/upload-artifact@v7
        with:
          name: modeling-artifacts
          path: |
            reports/figures/modeling_*.png
            reports/figures/evaluation_*.png
            reports/tables/modeling_*.csv
            reports/tables/feature_selection_*.csv
            reports/tables/evaluation_*.csv
            reports/tables/modeling_best_summary.json
            reports/tables/evaluation_summary_*.json
            data/processed/feature_consensus.json
            models/*.metadata.json
          if-no-files-found: error
          retention-days: 30

  smoke-test-phase4:
    name: End-to-end smoke test (despliegue · Fase 4)
    runs-on: ubuntu-latest
    needs: smoke-test-phase3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run deployment smoke test (reconstruye artefactos + ejercita la API)
        run: python scripts/deployment/main.py --quiet --ensure-artifacts

      - name: Verify expected outputs (Fase 4)
        run: |
          test -f reports/tables/deployment_smoke.json
          python <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/tables/deployment_smoke.json").read_text("utf-8"))
          assert report["ok"] is True, report
          assert report["n_failed"] == 0, report
          assert report["n_checks"] >= 5, report
          names = {c["name"] for c in report["checks"]}
          expected = {"GET /health", "GET /metadata", "POST /predict", "POST /predict/batch"}
          assert expected <= names, names
          print("smoke-test-phase4 OK")
          PY

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deployment-artifacts
          path: reports/tables/deployment_smoke.json
          if-no-files-found: error
          retention-days: 30

  docker-smoke:
    name: Docker build + smoke HTTP (Fase 4)
    runs-on: ubuntu-latest
    needs: smoke-test-phase4

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production image
        run: docker build -t churnlens-api:ci .

      - name: Run container
        run: docker run -d --name churnlens-api -p 8000:8000 churnlens-api:ci

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null 2>&1; then
              echo "API healthy after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "API never became healthy" >&2
          exit 1

      - name: Smoke /predict over real HTTP
        run: |
          curl -fsS http://localhost:8000/metadata | python -m json.tool
          cat > /tmp/payload.json <<'JSON'
          {
            "customerID": "9237-HQITU",
            "gender": "Female",
            "SeniorCitizen": 0,
            "Partner": "No",
            "Dependents": "No",
            "tenure": 2,
            "PhoneService": "Yes",
            "MultipleLines": "No",
            "InternetService": "Fiber optic",
            "OnlineSecurity": "No",
            "OnlineBackup": "No",
            "DeviceProtection": "No",
            "TechSupport": "No",
            "StreamingTV": "No",
            "StreamingMovies": "No",
            "Contract": "Month-to-month",
            "PaperlessBilling": "Yes",
            "PaymentMethod": "Electronic check",
            "MonthlyCharges": 70.70,
            "TotalCharges": 151.65
          }
          JSON
          curl -fsS -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json | tee /tmp/prediction.json
          python <<'PY'
          import json

          pred = json.loads(open("/tmp/prediction.json").read())
          assert 0.0 <= pred["probability"] <= 1.0, pred
          assert pred["prediction"] in (0, 1), pred
          assert pred["model"] == "logreg_l1", pred
          print("docker-smoke OK:", pred)
          PY

      - name: Show container logs on failure
        if: failure()
        run: docker logs churnlens-api

      - name: Cleanup
        if: always()
        run: docker rm -f churnlens-api || true
